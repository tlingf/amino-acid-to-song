<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Protein Sequence Aligner | Needleman-Wunsch Global Alignment</title>
<meta name="description" content="Align amino acid sequences in the browser using Needleman-Wunsch global alignment with configurable match, mismatch, and gap scoring."/>
<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"/>
<link rel="canonical" href="https://proteinplayer.com/align.html"/>
<meta property="og:type" content="website"/>
<meta property="og:site_name" content="Protein Melody Player"/>
<meta property="og:title" content="Protein Sequence Aligner"/>
<meta property="og:description" content="In-browser global pairwise alignment for amino acid sequences with customizable scoring."/>
<meta property="og:url" content="https://proteinplayer.com/align.html"/>
<meta name="twitter:card" content="summary"/>
<meta name="twitter:title" content="Protein Sequence Aligner"/>
<meta name="twitter:description" content="Needleman-Wunsch global alignment for amino acid sequences in your browser."/>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Protein Sequence Aligner",
  "url": "https://proteinplayer.com/align.html",
  "description": "A browser-based amino acid sequence aligner using Needleman-Wunsch global alignment.",
  "applicationCategory": "EducationalApplication",
  "operatingSystem": "Any",
  "inLanguage": "en",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD"
  }
}
</script>
<link rel="stylesheet" href="align.css"/>
</head>
<body>
<header>
  <h1>Sequence Aligner</h1>
  <p class="subtitle">Pairwise alignment of amino acid sequences with Needleman-Wunsch global alignment</p>
</header>

<main>
  <section class="input-section">
    <div class="input-header">
      <span class="section-label">Input Sequences</span>
      <span class="section-hint">One per line, FASTA (&gt;name), or TSV/CSV (name&lt;tab&gt;sequence). First sequence is the baseline.</span>
    </div>
    <textarea id="seqInput" class="seq-textarea" rows="6" placeholder="Paste sequences: one per line, FASTA, or name&#9;sequence from a spreadsheet&#10;&#10;Examples:&#10;MALWMRLLPLLALLALW...&#10;MALLVHFLPLLALLALW...&#10;&#10;or:  >Human insulin&#10;     MALWMRLLPLLALLALW..."></textarea>
    <div class="action-row">
      <button class="btn btn-primary" id="alignBtn">Align</button>
      <button class="btn btn-sm" id="exampleBtn">load example</button>
      <div class="scoring-controls">
        <label>Match <input type="number" id="matchScore" value="1" min="0" max="10" step="1"/></label>
        <label>Mismatch <input type="number" id="mismatchScore" value="-1" min="-10" max="0" step="1"/></label>
        <label>Gap <input type="number" id="gapScore" value="-2" min="-10" max="0" step="1"/></label>
      </div>
    </div>
  </section>

  <section class="results-section" id="results" style="display:none">
    <div class="results-header">
      <span class="section-label">Results</span>
      <span class="section-hint">Seq 1 is the baseline</span>
      <div class="view-toggle">
        <button data-mode="full" class="active" onclick="setViewMode('full')">Full</button>
        <button data-mode="compact" onclick="setViewMode('compact')">Compact</button>
      </div>
    </div>
    <div id="lengths" class="lengths-bar"></div>
    <div id="statsGrid"></div>
    <div id="alignments"></div>
  </section>
</main>

<footer>
  <a href="index.html">AA Melody Player</a>
</footer>

<script src="align.js"></script>
</body>
</html>
